[package]
name = "postgres-whiteboard"
version = "0.1.0"
edition = "2021"

[dependencies]
socketioxide-postgres = { path = "../../crates/socketioxide-postgres", features = [
    "sqlx",
    "tokio-postgres",
] }
socketioxide = { workspace = true, features = ["tracing", "msgpack"] }
axum.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tower-http.workspace = true
tower.workspace = true
tracing-subscriber.workspace = true
tracing.workspace = true
serde.workspace = true
rmpv.workspace = true

[[bin]]
name = "sqlx"
path = "src/sqlx.rs"

[[bin]]
name = "tokio_postgres"
path = "src/tokio_postgres.rs"
